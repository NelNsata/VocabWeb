<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Remember & Stat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <h1 class="text-3xl font-bold text-slate-800 mb-8 text-center">🧠 Vocab Remember & Stat</h1>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-4 border border-slate-100">
            <div class="flex gap-2">
                <input type="text" id="vocabInput" placeholder="กรอกคำศัพท์ภาษาอังกฤษ..." 
                    class="flex-1 p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none text-lg transition-all">
                <button onclick="processVocab()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 rounded-xl font-bold transition">
                    เพิ่ม/เช็ค
                </button>
            </div>
            <div class="mt-4 flex justify-center">
                <button onclick="openVocabList()" class="text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1 transition">
                    📖 ดูคลังคำศัพท์ที่บันทึกไว้ทั้งหมด
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 space-y-4">
                <div id="resultCard" class="hidden bg-white p-6 rounded-2xl shadow-md border-l-8 border-blue-500 animate-fade-in relative overflow-hidden">
                    <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center z-10">
                        <span class="text-blue-600 font-medium italic">กำลังแปลภาษา...</span>
                    </div>
                    <h2 id="displayWord" class="text-4xl font-black mb-2 uppercase"></h2>
                    <p id="displayTrans" class="text-xl text-slate-600 mb-4 font-medium"></p>
                    <hr class="mb-4">
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div class="bg-slate-100 p-3 rounded-lg">
                            <span class="block text-slate-500 font-bold">Past Tense (อดีต)</span>
                            <span id="pastTense" class="text-blue-700 font-semibold italic text-lg"></span>
                        </div>
                        <div class="bg-slate-100 p-3 rounded-lg">
                            <span class="block text-slate-500 font-bold">Future Tense (อนาคต)</span>
                            <span id="futureTense" class="text-green-700 font-semibold italic text-lg"></span>
                        </div>
                    </div>
                </div>
                
                <div id="welcomeMessage" class="text-center py-20 text-slate-400 bg-white/50 rounded-2xl border-2 border-dashed border-slate-200">
                    <p>ป้อนคำศัพท์เพื่อเริ่มต้นบันทึกความจำ</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md self-start">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">📊 สถิติความจำ</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500">คำศัพท์ทั้งหมด</span>
                        <span id="totalCount" class="font-bold text-xl text-blue-600">0</span>
                    </div>
                    <div class="flex justify-between items-center border-t pt-2">
                        <span class="text-red-500 font-medium text-sm">ครั้งที่พิมพ์ซ้ำ (ลืม)</span>
                        <span id="forgetCount" class="font-bold text-xl text-red-500">0</span>
                    </div>
                    <div class="pt-4 h-40">
                        <canvas id="statChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="vocabModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[85vh] overflow-hidden shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h2 class="text-2xl font-bold text-slate-800">📚 VOCABULARY LOG</h2>
                <button onclick="closeVocabList()" class="text-slate-400 hover:text-slate-600 text-3xl">&times;</button>
            </div>
            <div class="p-0 overflow-y-auto flex-1">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-slate-100 shadow-sm z-10">
                        <tr class="text-slate-500 text-xs uppercase tracking-wider">
                            <th class="p-4 font-bold">Word</th>
                            <th class="p-4 font-bold">Translation</th>
                            <th class="p-4 font-bold text-center">Repeat</th>
                            <th class="p-4 font-bold text-center">Delete</th>
                        </tr>
                    </thead>
                    <tbody id="vocabTableBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
